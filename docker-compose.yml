services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-travel-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app/data:/app/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-travel-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: ai-travel-jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - c:/ai-travel-guide:/app
    restart: unless-stopped

volumes:
  jenkins_home:
